<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e94560" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="InfoHub" />
  <title>InfoHub - 订阅聚合</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      --bg-color: #f5f5f5;
      --text-color: #333;
      --card-bg: #fff;
      --border-color: #eee;
      --nav-bg: #1a1a2e;
      --nav-text: white;
      --btn-bg: #f8f8f8;
      --btn-hover: #1a1a2e;
      --btn-hover-text: white;
      --primary-color: #e94560;
    }
    html.dark {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --card-bg: #1e1e1e;
      --border-color: #333;
      --nav-bg: #1a1a2e; /* 保持深色导航栏或改成更深 */
      --nav-text: #e0e0e0;
      --btn-bg: #2c2c2c;
      --btn-hover: #e94560;
      --btn-hover-text: white;
      --primary-color: #e94560;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }
  </style>
  <script>
    // 在加载前应用主题，避免闪烁
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script type="module" crossorigin src="/assets/index-D7pVy9P7.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BYT1a4rk.css">
</head>
<body>
  <div id="app"></div>
  <script>
    // PWA Service Worker 注册
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW failed', err));
    }
  </script>
</body>
</html>
